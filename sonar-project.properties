sonar.projectKey=teppei19980914_YumeHashi
sonar.organization=teppei19980914
sonar.projectName=YumeHashi

sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Dart coverage report (generated by flutter test --coverage)
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated files from analysis
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/generated/**
