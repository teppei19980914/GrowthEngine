name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for SonarCloud processing
        if: github.event_name == 'push'
        run: sleep 10

      - name: Export SonarCloud report
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mkdir -p sonarcloud-reports

          # Fetch issues from SonarCloud API
          RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=teppei19980914_GrowthEngine&statuses=OPEN,CONFIRMED&ps=500")

          TOTAL=$(echo "$RESPONSE" | jq -r '.total')
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT_SHA="${GITHUB_SHA:0:7}"

          {
            echo "# SonarCloud Analysis Report"
            echo "Date: ${DATE}"
            echo "Commit: ${COMMIT_SHA}"
            echo "Total Issues: ${TOTAL}"
            echo ""

            # Fetch metrics
            METRICS=$(curl -s -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/measures/component?component=teppei19980914_GrowthEngine&metricKeys=bugs,vulnerabilities,security_hotspots,code_smells,coverage,duplicated_lines_density,reliability_rating,security_rating,sqale_rating")

            echo "## Metrics"
            echo "$METRICS" | jq -r '.component.measures[] | "- \(.metric): \(.value)"' 2>/dev/null || echo "- (metrics not yet available)"
            echo ""

            echo "## Issues"
            echo ""

            if [ "$TOTAL" = "0" ]; then
              echo "No issues found."
            else
              # Group by severity
              for SEVERITY in BLOCKER CRITICAL MAJOR MINOR INFO; do
                COUNT=$(echo "$RESPONSE" | jq -r "[.issues[] | select(.severity==\"${SEVERITY}\")] | length")
                if [ "$COUNT" != "0" ]; then
                  echo "### ${SEVERITY} (${COUNT})"
                  echo ""
                  echo "$RESPONSE" | jq -r ".issues[] | select(.severity==\"${SEVERITY}\") | \"- [\(.type)] \(.message)  \n  File: \(.component | sub(\"teppei19980914_GrowthEngine:\"; \"\")) Line: \(.line // \"N/A\")\"" 2>/dev/null
                  echo ""
                fi
              done
            fi
          } > sonarcloud-reports/latest-report.txt

          # Keep history
          cp sonarcloud-reports/latest-report.txt "sonarcloud-reports/report-$(date -u +%Y%m%d).txt"

      - name: Commit report
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sonarcloud-reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "SonarCloud analysis report [skip ci]"
            git push
          fi
